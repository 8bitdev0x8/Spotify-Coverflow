<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Spotify CoverFlow</title>
    <link rel="stylesheet" href="styles.css" />

    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#03060b" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32.png" />
    <link rel="apple-touch-icon" href="images/icons/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoverFlow" />
  </head>
  <body>

    <!-- ── Landing ──────────────────────────────────── -->
    <section id="landing" class="view-landing">
      <div class="landing-inner">
        <div class="landing-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="56" height="56" aria-hidden="true">
            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
          </svg>
        </div>
        <h1>CoverFlow</h1>
        <p class="landing-sub">Rediscover your Spotify library through a beautiful, immersive <a href="https://www.steelskies.com/coverflow/" target="_blank" rel="noopener" class="landing-link">Cover Flow</a> experience.</p>
        <button id="login-button" class="connect-btn">Connect with Spotify</button>
        <button id="demo-button" class="demo-btn">Try the demo</button>

        <div id="clientid-setup" class="clientid-setup" hidden>
          <label class="menu-label" for="clientid-input">Spotify Client ID</label>
          <div class="menu-row">
            <input id="clientid-input" class="menu-input" type="text" placeholder="Paste your Client ID" autocomplete="off" spellcheck="false" />
            <button id="clientid-save" class="menu-action">Save</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Player ──────────────────────────────────── -->
    <div id="player" class="view-player" hidden>
      <div id="coverflow-track" class="coverflow-track" tabindex="0" aria-label="Album coverflow, use arrow keys or swipe to navigate"></div>
      <div id="selected-info" class="selected-info">
        <p class="placeholder">Loading…</p>
      </div>

      <!-- Corner menu -->
      <button id="menu-btn" class="menu-btn" aria-label="Menu">&#8942;</button>
      <div id="menu-panel" class="menu-panel" hidden>
        <label class="menu-label">Playlist</label>
        <div class="menu-row">
          <input id="playlist-link" class="menu-input" type="text" placeholder="Spotify playlist URL" />
          <button id="load-playlist" class="menu-action">Load</button>
        </div>
        <hr class="menu-divider" />
        <button id="disconnect-btn" class="menu-action danger">Disconnect</button>
      </div>

      <!-- Miniplayer -->
      <div id="miniplayer" class="miniplayer">
        <div class="miniplayer-progress">
          <span id="miniplayer-time-current" class="miniplayer-time">0:00</span>
          <input id="miniplayer-seek" class="miniplayer-seek" type="range" min="0" max="0" value="0" aria-label="Seek" />
          <span id="miniplayer-time-duration" class="miniplayer-time">0:00</span>
        </div>
        <div class="miniplayer-controls">
          <button id="miniplayer-lyrics" class="miniplayer-btn miniplayer-lyrics-btn" aria-label="Show lyrics">Aa</button>
          <div class="miniplayer-transport">
            <button id="miniplayer-prev" class="miniplayer-btn" aria-label="Previous track">&#9198;</button>
            <button id="miniplayer-playpause" class="miniplayer-btn miniplayer-btn-main" aria-label="Play">&#9654;</button>
            <button id="miniplayer-next" class="miniplayer-btn" aria-label="Next track">&#9197;</button>
          </div>
          <div class="miniplayer-volume">
            <button id="miniplayer-mute" class="miniplayer-btn" aria-label="Mute"></button>
            <input id="miniplayer-volume-slider" class="miniplayer-volume-slider" type="range" min="0" max="100" value="70" aria-label="Volume" />
          </div>
        </div>
      </div>

      <!-- Lyrics -->
      <div id="lyrics-view" class="lyrics-view" hidden>
        <div class="lyrics-panel">
          <button id="lyrics-close" class="lyrics-close" aria-label="Close lyrics">&times;</button>
          <div class="lyrics-header">
            <p id="lyrics-track-title" class="lyrics-track-title">—</p>
            <p id="lyrics-track-artist" class="lyrics-track-artist">—</p>
          </div>
          <div id="lyrics-body" class="lyrics-body">
            <p class="placeholder">Select a track to see lyrics.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Global status toast -->
    <p id="status" class="global-status" aria-live="polite"></p>

    <!-- Version credit -->
    <footer class="version-credit">
      v0.2 &nbsp;&bull;&nbsp; <a href="https://github.com/8bitdev0x8" target="_blank" rel="noopener">@8bitdev0x8</a>
    </footer>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
